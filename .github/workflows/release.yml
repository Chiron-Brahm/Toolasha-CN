name: Release

on:
    push:
        branches: [main]

permissions:
    contents: write

jobs:
    build-and-release:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build (production bundles)
              run: npm run build

            - name: Build (Standalone enhancement library)
              run: npm run build:enhancement

            - name: Commit built files to releases branch
              run: |
                  # Configure git
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  # Save the built files
                  cp dist/Toolasha.user.js /tmp/Toolasha.user.js
                  cp -R dist/libraries /tmp/libraries

                  # Fetch and checkout releases branch (create if doesn't exist)
                  git fetch origin releases:releases 2>/dev/null || git checkout --orphan releases
                  git checkout releases 2>/dev/null || git checkout --orphan releases

                  # Clean the branch and add only the built files
                  git rm -rf . 2>/dev/null || true
                  mkdir -p dist
                  mkdir -p dist/libraries
                  cp /tmp/Toolasha.user.js dist/Toolasha.user.js
                  cp -R /tmp/libraries/* dist/libraries/
                  git add dist/Toolasha.user.js dist/libraries/*.js

                  # Commit libraries
                  git commit -m "chore(main): release ${{ github.event.head_commit.message }}"

                  # Pin entrypoint @require URLs to the library commit SHA
                  lib_sha=$(git rev-parse HEAD)
                  LIB_SHA="$lib_sha" node -e "const fs=require('fs');const path='dist/Toolasha.user.js';const base='https://cdn.jsdelivr.net/gh/${{ github.repository }}@'+process.env.LIB_SHA+'/dist/libraries/';const content=fs.readFileSync(path,'utf8');const updated=content.split('https://UPDATE-THIS-URL/').join(base);fs.writeFileSync(path,updated);"

                  git add dist/Toolasha.user.js
                  git commit -m "chore(main): pin library requires"

                  # Push releases branch
                  git push origin releases --force

            - name: Upload userscripts as release artifact
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ github.sha }}
                  name: Release ${{ github.sha }}
                  generate_release_notes: false
                  files: |
                      dist/Toolasha.user.js
                      dist/libraries/*.js
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}