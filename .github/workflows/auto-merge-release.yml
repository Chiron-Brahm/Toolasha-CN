name: Auto-Merge Release PR

on:
    pull_request:
        types: [opened, synchronize]
        branches: [main]

permissions:
    contents: write
    pull-requests: write
    checks: read

jobs:
    auto-merge:
        if: startsWith(github.head_ref, 'release-please--')
        runs-on: ubuntu-latest
        steps:
            - name: Wait for CI checks
              run: |
                  echo "Waiting for CI checks to complete..."
                  for i in $(seq 1 60); do
                    STATUS=$(gh api "repos/${{ github.repository }}/commits/${{ github.event.pull_request.head.sha }}/check-runs" \
                      --jq '.check_runs[] | select(.name=="lint-and-build" or .name=="format-release-notes") | .name + ":" + .status + ":" + .conclusion' | tr '\n' ' ')
                    
                    LINT_STATUS=$(echo "$STATUS" | grep -o 'lint-and-build:[^ ]*' | head -1 | cut -d: -f2-)
                    FORMAT_STATUS=$(echo "$STATUS" | grep -o 'format-release-notes:[^ ]*' | head -1 | cut -d: -f2-)
                    
                    echo "Check $i: lint=$LINT_STATUS format=$FORMAT_STATUS"
                    
                    if echo "$LINT_STATUS" | grep -qE "completed:(success|skipped)" && echo "$FORMAT_STATUS" | grep -q "completed:success"; then
                      echo "✅ All checks passed"
                      break
                    elif echo "$LINT_STATUS" | grep -qE "completed:(failure|cancelled|timed_out)" || echo "$FORMAT_STATUS" | grep -qE "completed:(failure|cancelled|timed_out)"; then
                      echo "❌ A check failed"
                      exit 1
                    else
                      sleep 15
                    fi
                  done
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Approve PR
              run: |
                  gh pr review "${{ github.event.pull_request.html_url }}" \
                    --approve \
                    --body "Auto-approved: CI checks passed."
              env:
                  GH_TOKEN: ${{ secrets.PAT }}

            - name: Enable auto-merge
              run: |
                  gh pr merge "${{ github.event.pull_request.html_url }}" \
                    --auto \
                    --squash \
                    --delete-branch
              env:
                  GH_TOKEN: ${{ secrets.PAT }}
