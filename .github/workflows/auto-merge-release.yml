name: Auto-Merge Release PR

on:
    pull_request:
        types: [opened, synchronize]
        branches: [main]

permissions:
    contents: write
    pull-requests: write
    checks: read

jobs:
    auto-merge:
        if: startsWith(github.head_ref, 'release-please--')
        runs-on: ubuntu-latest
        steps:
            - name: Wait for CI checks
              run: |
                  echo "Waiting for CI checks to complete..."
                  for i in $(seq 1 60); do
                    STATUS=$(gh api "repos/${{ github.repository }}/commits/${{ github.event.pull_request.head.sha }}/check-runs" \
                      --jq '.check_runs[] | select(.name=="lint-and-build") | .status + ":" + .conclusion')
                    echo "Check $i: $STATUS"
                    case "$STATUS" in
                      "completed:success") echo "✅ CI passed"; break ;;
                      "completed:failure"|"completed:cancelled"|"completed:timed_out") echo "❌ CI failed"; exit 1 ;;
                      *) sleep 15 ;;
                    esac
                  done
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Approve PR
              run: |
                  gh pr review "${{ github.event.pull_request.html_url }}" \
                    --approve \
                    --body "Auto-approved: CI checks passed."
              env:
                  GH_TOKEN: ${{ secrets.PAT }}

            - name: Enable auto-merge
              run: |
                  gh pr merge "${{ github.event.pull_request.html_url }}" \
                    --auto \
                    --squash \
                    --delete-branch
              env:
                  GH_TOKEN: ${{ secrets.PAT }}
