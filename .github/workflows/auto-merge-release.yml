name: Auto-Merge Release PR

on:
    pull_request:
        types: [opened, synchronize]
        branches: [main]

permissions:
    contents: write
    pull-requests: write
    checks: read

jobs:
    auto-merge:
        if: startsWith(github.head_ref, 'release-please--')
        runs-on: ubuntu-latest
        steps:
            - name: Wait for CI checks
              run: |
                  echo "Waiting for CI checks to complete..."
                  for i in $(seq 1 60); do
                    STATUS=$(gh api "repos/${{ github.repository }}/commits/${{ github.event.pull_request.head.sha }}/check-runs" \
                      --jq '.check_runs[] | select(.name=="lint-and-build" or .name=="format-release-notes") | .name + ":" + .status + ":" + .conclusion' | tr '\n' ' ')
                    
                    FORMAT_STATUS=$(gh api "repos/${{ github.repository }}/commits/${{ github.event.pull_request.head.sha }}/check-runs" \
                      --jq '.check_runs[] | select(.name=="format-release-notes") | .conclusion' 2>/dev/null)
                    
                    echo "Check $i: format-release-notes=$FORMAT_STATUS"
                    
                    if echo "$FORMAT_STATUS" | grep -q "success"; then
                      echo "✅ format-release-notes passed"
                      break
                    elif echo "$FORMAT_STATUS" | grep -qE "failure|cancelled|timed_out"; then
                      echo "❌ format-release-notes failed"
                      exit 1
                    else
                      sleep 15
                    fi
                  done
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Enable auto-merge
              run: |
                  gh pr merge "${{ github.event.pull_request.html_url }}" \
                    --auto \
                    --squash \
                    --delete-branch
              env:
                  GH_TOKEN: ${{ secrets.PAT }}
